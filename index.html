<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>خانه هوشمند | Glass UI</title>
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      background: linear-gradient(145deg, #f3f0ff 0%, #e6f0ff 100%);
      color: #1e293b;
      min-height: 100vh;
      padding: 20px 16px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* لایه‌های تزئینی پس‌زمینه (Blur) */
    .bg-blur-1, .bg-blur-2 {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      filter: blur(80px);
      z-index: -1;
    }
    .bg-blur-1 { top: -100px; right: -50px; background: #c084fc; opacity: 0.3; }
    .bg-blur-2 { bottom: -50px; left: -50px; background: #60a5fa; opacity: 0.3; }

    /* حالت تاریک - با متغیرهای تلگرام override می‌شوند */
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(145deg, #1e1e2f 0%, #2a2a40 100%);
        color: #e2e8f0;
      }
      .glass-card {
        background: rgba(30, 30, 50, 0.5) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
      }
    }

    /* کارت شیشه‌ای اصلی */
    .glass-card {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05), 0 0 0 0.5px rgba(255, 255, 255, 0.6) inset;
      transition: all 0.2s ease;
    }

    /* هدر */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .greeting h2 {
      font-weight: 400;
      font-size: 18px;
      opacity: 0.8;
    }
    .greeting h1 {
      font-weight: 700;
      font-size: 28px;
      margin-top: 4px;
    }
    .avatar {
      width: 56px;
      height: 56px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      backdrop-filter: blur(4px);
      border: 1.5px solid white;
    }

    /* نوار پیشرفت (دستگاه‌های فعال) */
    .progress-section {
      margin: 24px 0 16px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      height: 8px;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 20px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #8b5cf6, #3b82f6);
      border-radius: 20px;
      transition: width 0.3s;
      box-shadow: 0 0 10px #8b5cf680;
    }

    /* عنوان بخش‌ها */
    .section-title {
      display: flex;
      align-items: baseline;
      margin: 25px 0 12px;
    }
    .section-title h3 {
      font-weight: 600;
      font-size: 20px;
    }
    .section-title span {
      margin-right: 10px;
      font-size: 14px;
      opacity: 0.7;
    }

    /* گرید دستگاه‌ها */
    .grid-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* کارت دستگاه */
    .device-card {
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 18px 12px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
      text-align: center;
      transition: transform 0.1s;
      cursor: pointer;
    }
    .device-card:active {
      transform: scale(0.97);
    }
    .device-icon {
      font-size: 40px;
      margin-bottom: 12px;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
    }
    .device-name {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 8px;
    }
    .device-status {
      font-size: 13px;
      padding: 4px 0;
      border-radius: 30px;
      margin-bottom: 12px;
      color: #334155;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 40px;
      background: rgba(0,0,0,0.05);
      font-size: 13px;
      font-weight: 500;
    }
    .status-badge.on {
      background: #4cd964;
      color: white;
    }
    .status-badge.off {
      background: #ff3b30;
      color: white;
    }
    .toggle-btn {
      background: rgba(255, 255, 255, 0.7);
      border: none;
      padding: 10px 0;
      border-radius: 40px;
      font-weight: 600;
      color: #1e293b;
      width: 100%;
      cursor: pointer;
      backdrop-filter: blur(4px);
      border: 0.5px solid rgba(255,255,255,0.8);
      font-size: 14px;
      transition: 0.2s;
    }
    .toggle-btn:active {
      background: white;
    }

    /* ترموستات اختصاصی */
    .thermostat-card {
      margin-top: 8px;
    }
    .temp-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 15px 0 5px;
    }
    .temp-value-large {
      font-size: 42px;
      font-weight: 300;
    }
    .slider {
      width: 100%;
      accent-color: #8b5cf6;
    }

    /* دکمه شناور بازنشانی (MainButton تلگرام رو مخفی می‌کنیم و خودمون می‌ذاریم) */
    .reset-btn {
      margin-top: 30px;
      text-align: center;
    }
    .reset-btn button {
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(8px);
      border: 0.5px solid white;
      padding: 14px 30px;
      border-radius: 60px;
      font-weight: 600;
      color: #1e293b;
      cursor: pointer;
      font-size: 16px;
      width: auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>
  <div class="bg-blur-1"></div>
  <div class="bg-blur-2"></div>

  <!-- هدر -->
  <div class="glass-card">
    <div class="header">
      <div class="greeting">
        <h2>عصر بخیر</h2>
        <h1 id="userNameDisplay">کاربر</h1>
      </div>
      <div class="avatar" id="avatarEmoji">🏠</div>
    </div>
  </div>

  <!-- کارت پیشرفت دستگاه‌ها -->
  <div class="glass-card">
    <div class="progress-section">
      <div class="progress-label">
        <span>⚡ کنترل خانه هوشمند</span>
        <span id="activeDevicesText">0 از 5 فعال</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBarFill" style="width: 60%;"></div>
      </div>
    </div>
    <div style="margin-top: 16px; font-size: 15px; opacity: 0.8;">
      ✨ <span id="statusSummary">همه دستگاه‌ها عادی هستند</span>
    </div>
  </div>

  <!-- بخش روشنایی -->
  <div class="section-title">
    <h3>💡 روشنایی</h3>
    <span>لامپ‌ها</span>
  </div>
  <div class="grid-2col" id="lightsGrid"></div>

  <!-- بخش دما -->
  <div class="section-title">
    <h3>🌡️ ترموستات</h3>
    <span>تنظیم دما</span>
  </div>
  <div class="glass-card thermostat-card" id="climateCard"></div>

  <!-- بخش امنیت -->
  <div class="section-title">
    <h3>🔒 امنیت</h3>
    <span>قفل و دوربین</span>
  </div>
  <div class="grid-2col" id="securityGrid"></div>

  <!-- دکمه بازنشانی -->
  <div class="reset-btn">
    <button id="resetButton">🔄 بازنشانی به حالت اولیه</button>
  </div>

  <script>
    (function(){
      const tg = window.Telegram.WebApp;
      tg.expand();
      tg.ready();
      tg.MainButton.hide(); // از دکمه خودمون استفاده می‌کنیم

      // تنظیم هدر و پس‌زمینه
      if (tg.setHeaderColor) tg.setHeaderColor('bg_color');
      if (tg.setBackgroundColor) tg.setBackgroundColor('bg_color');

      // اطلاعات کاربر
      const user = tg.initDataUnsafe?.user;
      const firstName = user?.first_name || 'کاربر';
      document.getElementById('userNameDisplay').textContent = firstName;
      document.getElementById('avatarEmoji').textContent = firstName.charAt(0).toUpperCase() || '🏠';

      // ------------------- داده‌های دستگاه‌ها ------------------
      const defaultDevices = {
        lights: [
          { id: 'light1', name: 'پذیرایی', icon: '💡', state: true },
          { id: 'light2', name: 'اتاق خواب', icon: '🛏️', state: false },
          { id: 'light3', name: 'آشپزخانه', icon: '🍳', state: false },
          { id: 'light4', name: 'راهرو', icon: '🚪', state: true }
        ],
        climate: {
          temperature: 24,
          mode: 'cool' // cool, heat, off
        },
        security: [
          { id: 'lock1', name: 'قفل درب', icon: '🔐', state: true }, // true = قفل
          { id: 'cam1', name: 'دوربین', icon: '📹', state: true, online: true }
        ]
      };

      let devices = JSON.parse(JSON.stringify(defaultDevices));

      // ------------------- توابع کمکی ------------------
      function haptic(style = 'light') {
        tg.HapticFeedback?.impactOccurred(style);
      }

      function countActiveDevices() {
        let active = 0;
        devices.lights.forEach(l => { if (l.state) active++; });
        devices.security.forEach(s => {
          if (s.id === 'lock1' && !s.state) active++; // باز بودن قفل فعال محسوب می‌شه؟
          else if (s.id === 'cam1' && s.state && s.online) active++;
        });
        // ترموستات فعال اگر خاموش نباشه
        if (devices.climate.mode !== 'off') active++;
        return active;
      }

      const totalDevices = devices.lights.length + 1 + devices.security.length; // lights + climate + security
      
      function updateProgressAndSummary() {
        const active = countActiveDevices();
        const percent = (active / totalDevices) * 100;
        document.getElementById('progressBarFill').style.width = percent + '%';
        document.getElementById('activeDevicesText').textContent = `${active} از ${totalDevices} فعال`;
        
        let summary = 'همه دستگاه‌ها عادی هستند';
        if (active === 0) summary = 'هیچ دستگاهی فعال نیست';
        else if (active === totalDevices) summary = 'همه دستگاه‌ها فعال هستند ⚡';
        document.getElementById('statusSummary').textContent = summary;
      }

      // ------------------- ذخیره و بازیابی CloudStorage ----------------
      async function loadFromCloud() {
        if (!tg.CloudStorage) { renderAll(); return; }
        tg.CloudStorage.getItem('smartHomeGlass', (err, val) => {
          if (!err && val) {
            try {
              const saved = JSON.parse(val);
              devices = { ...defaultDevices, ...saved };
            } catch(e) {}
          }
          renderAll();
        });
      }

      async function saveToCloud() {
        if (!tg.CloudStorage) return;
        tg.CloudStorage.setItem('smartHomeGlass', JSON.stringify(devices), ()=>{});
      }

      // ------------------- رندر ------------------
      function renderAll() {
        renderLights();
        renderClimate();
        renderSecurity();
        updateProgressAndSummary();
      }

      function renderLights() {
        const grid = document.getElementById('lightsGrid');
        grid.innerHTML = '';
        devices.lights.forEach(light => {
          const card = document.createElement('div');
          card.className = 'device-card';
          card.innerHTML = `
            <div class="device-icon">${light.icon}</div>
            <div class="device-name">${light.name}</div>
            <div class="device-status"><span class="status-badge ${light.state ? 'on' : 'off'}">${light.state ? 'روشن' : 'خاموش'}</span></div>
            <button class="toggle-btn" data-id="${light.id}">${light.state ? 'خاموش کن' : 'روشن کن'}</button>
          `;
          grid.appendChild(card);
          card.querySelector('.toggle-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            light.state = !light.state;
            haptic('medium');
            renderAll();
            saveToCloud();
          });
        });
      }

      function renderClimate() {
        const container = document.getElementById('climateCard');
        const climate = devices.climate;
        let modeText = climate.mode === 'cool' ? '❄️ سرمایش' : (climate.mode === 'heat' ? '🔥 گرمایش' : '⏹️ خاموش');
        container.innerHTML = `
          <div style="display: flex; justify-content: space-between;">
            <span style="font-weight: 600; font-size: 18px;">ترموستات هوشمند</span>
            <span>${modeText}</span>
          </div>
          <div class="temp-row">
            <span class="temp-value-large">${climate.temperature}°</span>
            <span style="font-size: 16px;">دمای تنظیم</span>
          </div>
          <input type="range" min="16" max="30" value="${climate.temperature}" class="slider" id="tempSlider">
          <div style="display: flex; gap: 8px; margin-top: 16px;">
            <button class="toggle-btn" data-mode="cool" style="flex:1;">❄️ خنک</button>
            <button class="toggle-btn" data-mode="heat" style="flex:1;">🔥 گرم</button>
            <button class="toggle-btn" data-mode="off" style="flex:1;">⏹️ خاموش</button>
          </div>
        `;
        const slider = document.getElementById('tempSlider');
        slider.addEventListener('input', (e) => {
          climate.temperature = parseInt(e.target.value);
          document.querySelector('.temp-value-large').textContent = climate.temperature + '°';
        });
        slider.addEventListener('change', () => {
          haptic('soft');
          saveToCloud();
          updateProgressAndSummary();
        });
        container.querySelectorAll('[data-mode]').forEach(btn => {
          btn.addEventListener('click', () => {
            climate.mode = btn.dataset.mode;
            haptic('light');
            renderAll();
            saveToCloud();
          });
        });
      }

      function renderSecurity() {
        const grid = document.getElementById('securityGrid');
        grid.innerHTML = '';
        devices.security.forEach(device => {
          const card = document.createElement('div');
          card.className = 'device-card';
          let statusText = '', btnText = '';
          if (device.id === 'lock1') {
            statusText = device.state ? 'قفل' : 'باز';
            btnText = device.state ? 'باز کن' : 'قفل کن';
          } else {
            statusText = device.online ? (device.state ? 'فعال' : 'غیرفعال') : 'آفلاین';
            btnText = device.state ? 'غیرفعال' : 'فعال';
            if (!device.online) btnText = 'آفلاین';
          }
          card.innerHTML = `
            <div class="device-icon">${device.icon}</div>
            <div class="device-name">${device.name}</div>
            <div class="device-status"><span class="status-badge ${device.state ? 'on' : 'off'}">${statusText}</span></div>
            <button class="toggle-btn" data-id="${device.id}" ${!device.online && device.id==='cam1' ? 'disabled' : ''}>${btnText}</button>
          `;
          grid.appendChild(card);
          const btn = card.querySelector('.toggle-btn');
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (device.id === 'lock1') {
              device.state = !device.state;
            } else if (device.id === 'cam1' && device.online) {
              device.state = !device.state;
            }
            haptic('medium');
            renderAll();
            saveToCloud();
          });
        });
      }

      // بازنشانی
      document.getElementById('resetButton').addEventListener('click', () => {
        tg.showConfirm('تنظیمات به حالت پیش‌فرض برگردد؟', (ok) => {
          if (ok) {
            devices = JSON.parse(JSON.stringify(defaultDevices));
            renderAll();
            saveToCloud();
            haptic('warning');
            tg.showAlert('بازنشانی انجام شد.');
          }
        });
      });

      // راه‌اندازی
      loadFromCloud();
      
      // همگام‌سازی با تم تلگرام
      tg.onEvent('themeChanged', () => {
        // رنگ‌ها از طریق متغیرهای CSS به‌روز می‌شوند
      });
    })();
  </script>
</body>
</html>
