<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خانه هوشمند | پنل مدیریت</title>
    <!-- تلگرام WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
    <!-- فونت وزیر -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Vazirmatn', system-ui, -apple-system, sans-serif;
            background-color: var(--tg-theme-bg-color, #f5f7fa);
            color: var(--tg-theme-text-color, #1e1e1e);
            padding: 16px 12px 30px;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
            display: flex;
            flex-direction: column;
        }

        /* کانتینر اصلی */
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }

        /* --- هدر (پروفایل + خوش‌آمد) --- */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: var(--tg-theme-button-color, #2b6eb3);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .welcome-text {
            flex: 1;
        }

        .greeting {
            font-size: 1rem;
            opacity: 0.7;
        }

        .home-name {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge {
            background: var(--tg-theme-hint-color, #8e8e93);
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* --- کارت‌های خلاصه بالا (Power, Temp, Security) --- */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 20px;
            padding: 14px 8px;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.02);
            border: 1px solid rgba(127,127,127,0.1);
            backdrop-filter: blur(8px);
        }

        .stat-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .stat-sub {
            font-size: 0.7rem;
            opacity: 0.6;
        }

        /* --- کارت مصرف برق با نمودار --- */
        .card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 18px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.03);
            border: 1px solid rgba(127,127,127,0.1);
            backdrop-filter: blur(8px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            opacity: 0.9;
        }

        .more-icon {
            opacity: 0.5;
            font-size: 18px;
        }

        .usage-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chart-container {
            position: relative;
            width: 80px;
            height: 80px;
            flex-shrink: 0;
        }

        .chart-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .chart-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--tg-theme-text-color);
        }

        .usage-details {
            flex: 1;
        }

        .usage-price {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .usage-period {
            opacity: 0.6;
            font-size: 0.8rem;
        }

        .trend {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .trend.up { color: #e74c3c; }
        .trend.down { color: #2ecc71; }

        /* --- زمان‌بندی (Schedule) --- */
        .schedule-block {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
        }

        .schedule-time {
            display: flex;
            align-items: baseline;
            gap: 16px;
        }

        .time-box {
            text-align: center;
        }

        .time-label {
            font-size: 0.7rem;
            opacity: 0.5;
            margin-bottom: 4px;
        }

        .time-value {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .time-meridiem {
            font-size: 0.8rem;
            font-weight: 400;
            opacity: 0.7;
        }

        .arrow-icon {
            font-size: 24px;
            opacity: 0.3;
            margin: 0 8px;
        }

        /* --- ردیف انرژی (Electricity Cost و Usage Month) --- */
        .energy-row {
            display: flex;
            gap: 12px;
            margin-top: 4px;
        }

        .energy-item {
            flex: 1;
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid rgba(127,127,127,0.1);
        }

        .energy-label {
            font-size: 0.8rem;
            opacity: 0.6;
            margin-bottom: 8px;
        }

        .energy-value {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.1;
        }

        .energy-trend {
            font-size: 0.8rem;
            margin-top: 6px;
        }

        /* --- منوی پایین (Dashboard) --- */
        .bottom-nav {
            margin-top: 24px;
            display: flex;
            justify-content: space-around;
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            padding: 10px 12px;
            border-radius: 30px;
            border: 1px solid rgba(127,127,127,0.1);
            backdrop-filter: blur(8px);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.5;
            transition: 0.2s;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .nav-item.active {
            opacity: 1;
            color: var(--tg-theme-button-color, #2b6eb3);
            font-weight: 500;
        }

        .nav-item span:first-child {
            font-size: 20px;
            margin-bottom: 4px;
        }

        /* ریسپانسیو */
        @media (max-width: 380px) {
            .usage-price {
                font-size: 1.6rem;
            }
            .time-value {
                font-size: 1.1rem;
            }
            .stat-value {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- هدر پروفایل -->
        <div class="top-bar">
            <div class="avatar" id="userAvatar">🏠</div>
            <div class="welcome-text">
                <div class="greeting">خوش آمدید</div>
                <div class="home-name">
                    خانۀ هوشمند
                    <span class="badge" id="modeBadge">Offensive 2</span>
                </div>
            </div>
        </div>

        <!-- خلاصه وضعیت (Power, Temp, Security) -->
        <div class="summary-grid">
            <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-label">Power</div>
                <div class="stat-value">2.4kW</div>
                <div class="stat-sub">اکنون</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🌡️</div>
                <div class="stat-label">Home Temp</div>
                <div class="stat-value">24°C</div>
                <div class="stat-sub">مطبوع</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📹</div>
                <div class="stat-label">Security</div>
                <div class="stat-value">14</div>
                <div class="stat-sub">دوربین</div>
            </div>
        </div>

        <!-- کارت مصرف برق (Electricity Usage) با نمودار دایره‌ای 30% -->
        <div class="card">
            <div class="card-header">
                <h3>⚡ مصرف برق</h3>
                <span class="more-icon">⋯</span>
            </div>
            <div class="usage-row">
                <div class="chart-container">
                    <svg viewBox="0 0 36 36" class="chart-svg">
                        <path d="M18 2.0845
                            a 15.9155 15.9155 0 0 1 0 31.831
                            a 15.9155 15.9155 0 0 1 0 -31.831"
                            fill="none" stroke="var(--tg-theme-hint-color, #ddd)" stroke-width="3" />
                        <path id="usageArc" d="M18 2.0845
                            a 15.9155 15.9155 0 0 1 0 31.831"
                            fill="none" stroke="#f1c40f" stroke-width="3" stroke-dasharray="30, 100" />
                    </svg>
                    <div class="chart-text" id="usagePercent">30%</div>
                </div>
                <div class="usage-details">
                    <div class="usage-price" id="usagePrice">$171.31</div>
                    <div class="usage-period">این ماه</div>
                    <div class="trend" id="usageTrend">▲ 30%</div>
                </div>
            </div>
        </div>

        <!-- زمان‌بندی (Schedule) -->
        <div class="card">
            <div class="card-header">
                <h3>⏰ زمان‌بندی</h3>
                <span class="more-icon">⋯</span>
            </div>
            <div class="schedule-block">
                <div class="schedule-time">
                    <div class="time-box">
                        <div class="time-label">از</div>
                        <div class="time-value">5:00 <span class="time-meridiem">PM</span></div>
                    </div>
                    <div class="arrow-icon">→</div>
                    <div class="time-box">
                        <div class="time-label">تا</div>
                        <div class="time-value">10:00 <span class="time-meridiem">PM</span></div>
                    </div>
                </div>
                <div style="background: var(--tg-theme-button-color, #2b6eb3); padding: 8px 14px; border-radius: 30px; color: white; font-weight:500;">
                    فعال
                </div>
            </div>
        </div>

        <!-- ردیف هزینه و مصرف انرژی -->
        <div class="energy-row">
            <div class="energy-item">
                <div class="energy-label">💰 هزینۀ برق</div>
                <div class="energy-value">$171.31</div>
                <div class="energy-trend trend down">▼ 2.6%</div>
            </div>
            <div class="energy-item">
                <div class="energy-label">📊 مصرف ماهانه</div>
                <div class="energy-value">151 kW</div>
                <div class="energy-trend trend down">▼ 1.1%</div>
            </div>
        </div>

        <!-- منوی پایین (Dashboard فعال) -->
        <div class="bottom-nav">
            <div class="nav-item active">
                <span>🏠</span>
                <span>داشبورد</span>
            </div>
            <div class="nav-item">
                <span>⚡</span>
                <span>انرژی</span>
            </div>
            <div class="nav-item">
                <span>📅</span>
                <span>برنامه</span>
            </div>
            <div class="nav-item">
                <span>⚙️</span>
                <span>تنظیمات</span>
            </div>
        </div>
    </div>

    <script>
        (function(){
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            // تنظیم رنگ هدر
            if (tg.setHeaderColor) tg.setHeaderColor('secondary_bg_color');
            if (tg.setBackgroundColor) tg.setBackgroundColor('bg_color');

            // اطلاعات کاربر
            const user = tg.initDataUnsafe?.user;
            const avatarEl = document.getElementById('userAvatar');
            const userNameSpan = document.querySelector('.home-name');
            
            if (user) {
                // آواتار
                if (user.photo_url) {
                    avatarEl.style.backgroundImage = `url(${user.photo_url})`;
                    avatarEl.style.color = 'transparent';
                    avatarEl.textContent = '';
                } else {
                    avatarEl.textContent = user.first_name?.charAt(0).toUpperCase() || '🏠';
                }
                // اسم توی هدر (اختیاری: می‌تونیم نام کاربر رو هم بذاریم)
                // اما توی طرح نوشته "Callum Light" ما می‌تونیم "خانۀ هوشمند" بذاریم یا اسم کاربر.
                // اگر خواستی اسم کاربر بیاد، خط زیر رو فعال کن:
                // userNameSpan.innerHTML = `${user.first_name || ''} ${user.last_name || ''} <span class="badge">Offensive 2</span>`;
            } else {
                avatarEl.textContent = '🏠';
            }

            // اگر خواستی دیتا رو داینامیک کنی (مثلاً از DeviceStorage بخونی)
            // فعلاً استاتیک هست مطابق عکس.

            // تنظیم نمودار دایره‌ای 30% (همونطور که توی عکس هست)
            // مقدار stroke-dasharray رو برای 30% تنظیم کردیم: محیط دایره 100 هست، پس 30 = 30%
            // توی SVG استفاده کردیم.

            // مدیریت رویدادهای لمسی
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                item.addEventListener('click', function() {
                    navItems.forEach(n => n.classList.remove('active'));
                    this.classList.add('active');
                    if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
                    // اینجا می‌تونی view رو عوض کنی
                });
            });

            // دکمه‌های بیشتر (...) فعلاً عملکردی ندارن، می‌تونیم بعداً پاپ‌آپ اضافه کنیم
            document.querySelectorAll('.more-icon').forEach(el => {
                el.addEventListener('click', () => {
                    tg.showAlert('⚙️ تنظیمات بیشتر به زودی اضافه می‌شود.');
                });
            });

            // شبیه‌سازی قابلیت کلیک روی کارت‌ها
            const cards = document.querySelectorAll('.stat-card, .card');
            cards.forEach(c => {
                c.addEventListener('click', (e) => {
                    // فقط اگر روی دکمه بیشتر کلیک نشده باشه
                    if (!e.target.closest('.more-icon')) {
                        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    }
                });
            });

            console.log('✅ داشبورد هوشمند مطابق عکس بارگذاری شد.');
        })();
    </script>
</body>
</html>
