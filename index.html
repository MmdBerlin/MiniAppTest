<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تست مینی‌اپ</title>
    <!-- بارگذاری اسکریپت WebApp تلگرام -->
    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
    <style>
        /* استفاده از متغیرهای تم تلگرام برای تطابق کامل */
        body {
            margin: 0;
            padding: 16px;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: background-color 0.2s, color 0.2s;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            font-size: 3rem;
            font-weight: bold;
        }

        button {
            margin-top: 30px;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        button:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .output {
            margin-top: 30px;
            padding: 16px;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            font-size: 1.2rem;
            min-height: 60px;
            word-break: break-word;
        }

        /* ریسپانسیو برای موبایل */
        @media (max-width: 480px) {
            h1 {
                font-size: 2.2rem;
            }
            button {
                width: 100%;
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 Hello World!</h1>
        
        <!-- دکمه اصلی که دوباره چاپ می‌کنه -->
        <button id="sayHelloBtn">🔄 دوباره بگو سلام</button>

        <!-- محلی برای نمایش خروجی‌های اضافی -->
        <div id="outputArea" class="output">
            آماده دریافت پیام...
        </div>
    </div>

    <script>
        (function() {
            const tg = window.Telegram.WebApp;

            // گسترش به تمام ارتفاع و اعلام آمادگی
            tg.expand();
            tg.ready();

            // تنظیم رنگ هدر و پس‌زمینه برای هماهنگی با تم
            // (اختیاری اما زیباتر می‌شود)
            if (tg.setHeaderColor) {
                tg.setHeaderColor('bg_color');
            }
            if (tg.setBackgroundColor) {
                tg.setBackgroundColor('bg_color');
            }

            // نمایش اطلاعات کاربر (اختیاری)
            const user = tg.initDataUnsafe?.user;
            const userName = user ? (user.first_name || 'کاربر') : 'مهمان';

            // گرفتن المان‌های DOM
            const outputDiv = document.getElementById('outputArea');
            const sayHelloBtn = document.getElementById('sayHelloBtn');

            // تابع چاپ "Hello World" با احتساب تعداد دفعات
            let clickCount = 0;
            function printHelloWorld() {
                clickCount++;
                const message = `👋 Hello World! (دفعه ${clickCount}) - خوش آمدی ${userName}`;
                
                // نمایش در output area
                outputDiv.textContent = message;
                
                // همچنین می‌توانیم یک بازخورد لرزشی سبک بدهیم (اختیاری)
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
                
                // لاگ در کنسول
                console.log(message);
            }

            // اولین نمایش هنگام لود
            outputDiv.textContent = `👋 Hello World! - خوش آمدی ${userName}`;

            // اضافه کردن event listener به دکمه
            sayHelloBtn.addEventListener('click', printHelloWorld);

            // (اختیاری) استفاده از MainButton تلگرام به جای دکمه HTML
            // می‌توانید این بخش را کامنت کنید و از دکمه بالا استفاده کنید.
            /*
            const mainButton = tg.MainButton;
            mainButton.setText('🔄 دوباره بگو سلام');
            mainButton.show();
            mainButton.onClick(printHelloWorld);
            */
            
            // گوش دادن به تغییرات تم (اگر کاربر تم را عوض کند، رنگ‌ها خودکار آپدیت می‌شوند)
            tg.onEvent('themeChanged', () => {
                // نیازی به کار اضافه نیست، متغیرهای CSS خودکار تغییر می‌کنند
                console.log('تم تغییر کرد');
            });

            // نمایش موفقیت در کنسول
            console.log('مینی‌اپ تستی آماده است. کاربر:', userName);
        })();
    </script>
</body>
</html>
